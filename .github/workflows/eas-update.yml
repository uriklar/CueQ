name: EAS Update

on:
  push:
    branches:
      - main

jobs:
  eas-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Run EAS Update
        id: eas-update
        run: |
          OUTPUT=$(eas update --branch production --message "${{ github.event.head_commit.message }}" --non-interactive --json)
          echo "$OUTPUT"
          GROUP_ID=$(echo "$OUTPUT" | jq -r '.[0].group')
          echo "group_id=$GROUP_ID" >> "$GITHUB_OUTPUT"

      - name: Update redirect page
        run: |
          mkdir -p docs
          cat > docs/index.html << 'HEREDOC'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>CueQ</title>
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <meta http-equiv="refresh" content="0;url=PREVIEW_URL">
            <style>
              body { font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #f5f5f5; }
              .card { text-align: center; padding: 2rem; }
              a { color: #0066cc; font-size: 1.2rem; }
            </style>
          </head>
          <body>
            <div class="card">
              <h1>CueQ</h1>
              <p>Opening in Expo Go...</p>
              <p><a href="PREVIEW_URL">Tap here if it didn't open automatically</a></p>
            </div>
          </body>
          </html>
          HEREDOC

          PREVIEW_URL="https://expo.dev/preview/update?message=$(echo '${{ github.event.head_commit.message }}' | head -c 50 | jq -sRr @uri)&updateRuntimeVersion=1.0.0&createdAt=$(date -u +%Y-%m-%dT%H:%M:%S.000Z)&slug=CueQ&projectId=d74f216f-55c5-49e6-8109-d8b5cbab162a&group=${{ steps.eas-update.outputs.group_id }}"
          sed -i "s|PREVIEW_URL|${PREVIEW_URL}|g" docs/index.html

      - name: Commit and push redirect page
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --staged --quiet && exit 0
          git commit -m "chore: update Expo preview redirect [skip ci]"
          git push
