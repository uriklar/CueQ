name: Check word duplicates

on:
  pull_request:
    paths:
      - 'words.json'
      - 'app/data/words.ts'

jobs:
  check-duplicates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npx tsx scripts/check-duplicates.ts
